<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Spill Detection System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-title {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header-subtitle {
            font-size: 1.1em;
            color: #666;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        /* Upload Section */
        .upload-section {
            display: flex;
            flex-direction: column;
        }

        .section-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 40px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
            transform: translateY(-2px);
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }

        .upload-icon {
            font-size: 3.5em;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #333;
            font-size: 1.1em;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .upload-hint {
            color: #999;
            font-size: 0.95em;
            margin-bottom: 20px;
        }

        #fileInput {
            display: none;
        }

        .file-info {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 12px 15px;
            border-radius: 6px;
            margin-top: 20px;
            color: #1976D2;
            font-size: 0.95em;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        /* Results Section */
        .results-section {
            display: flex;
            flex-direction: column;
        }

        .image-container {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .image-placeholder {
            color: #999;
            font-size: 1em;
        }

        .result-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            border: 2px solid #ddd;
        }

        .prediction-info {
            margin-top: 20px;
            background: #f8f9ff;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }

        .prediction-info.show {
            display: block;
        }

        .prediction-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .prediction-row:last-child {
            margin-bottom: 0;
        }

        .prediction-label {
            color: #666;
            font-weight: 500;
        }

        .prediction-value {
            color: #333;
            font-weight: 600;
            font-size: 1.1em;
        }

        .confidence-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 30px;
            overflow: hidden;
            margin-top: 10px;
        }

        .confidence-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
            transition: width 0.6s ease;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }

        .status-detected {
            background: #ffebee;
            color: #c62828;
        }

        .status-safe {
            background: #e8f5e9;
            color: #2e7d32;
        }

        /* Button Styles */
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            font-size: 1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-predict {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 2;
        }

        .btn-predict:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-predict:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-clear {
            background: #e0e0e0;
            color: #333;
            flex: 1;
        }

        .btn-clear:hover {
            background: #d0d0d0;
            transform: translateY(-2px);
        }

        /* Loading State */
        .loading {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #666;
            font-size: 1.1em;
        }

        /* Alerts */
        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            font-size: 0.95em;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #f44336;
        }

        .alert-success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
        }

        .alert-info {
            background: #e3f2fd;
            color: #1976D2;
            border-left: 4px solid #2196F3;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .main-container {
                padding: 25px;
            }

            .header-title {
                font-size: 1.8em;
            }

            .content {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .button-group {
                flex-direction: column;
            }

            .btn-predict {
                flex: 1;
            }

            .btn-clear {
                flex: 1;
            }
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Header -->
        <div class="header">
            <h1 class="header-title">🌊 Oil Spill Detector</h1>
            <p class="header-subtitle">AI-powered satellite image analysis system</p>
        </div>

        <!-- Main Content -->
        <div class="content">
            <!-- Upload Section -->
            <div class="upload-section">
                <h2 class="section-title">📤 Upload Image</h2>
                
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📷</div>
                    <div class="upload-text">Click to upload image</div>
                    <div class="upload-hint">or drag and drop</div>
                    <input type="file" id="fileInput" accept="image/*">
                </div>

                <div class="file-info" id="fileInfo">
                    <strong>File selected:</strong> <span id="fileName"></span>
                </div>

                <div class="button-group">
                    <button class="btn-predict" id="predictBtn" disabled>🚀 Predict</button>
                    <button class="btn-clear" id="clearBtn">🔄 Clear</button>
                </div>

                <!-- Alerts -->
                <div class="alert alert-error" id="errorAlert"></div>
                <div class="alert alert-success" id="successAlert"></div>
            </div>

            <!-- Results Section -->
            <div class="results-section">
                <h2 class="section-title">📊 Results</h2>
                
                <!-- Loading -->
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <div class="loading-text">Analyzing image...</div>
                </div>

                <!-- Image Display -->
                <div class="image-container" id="imageContainer">
                    <div class="image-placeholder">Prediction image will appear here</div>
                </div>

                <!-- Prediction Info -->
                <div class="prediction-info" id="predictionInfo">
                    <div class="prediction-row">
                        <span class="prediction-label">Status:</span>
                        <span class="prediction-value" id="statusValue"></span>
                    </div>

                    <div class="prediction-row">
                        <span class="prediction-label">Confidence:</span>
                        <span class="prediction-value" id="confidenceValue"></span>
                    </div>

                    <div class="confidence-bar">
                        <div class="confidence-fill" id="confidenceFill" style="width: 0%">
                            <span id="confidencePercent">0%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ================== DOM Elements ==================
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const predictBtn = document.getElementById('predictBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loading = document.getElementById('loading');
        const imageContainer = document.getElementById('imageContainer');
        const predictionInfo = document.getElementById('predictionInfo');
        const errorAlert = document.getElementById('errorAlert');
        const successAlert = document.getElementById('successAlert');
        const statusValue = document.getElementById('statusValue');
        const confidenceValue = document.getElementById('confidenceValue');
        const confidenceFill = document.getElementById('confidenceFill');
        const confidencePercent = document.getElementById('confidencePercent');

        // ================== State ==================
        let selectedFile = null;
        const API_ENDPOINT = '/api/predict';

        // ================== Event Listeners ==================

        // Upload area click
        uploadArea.addEventListener('click', () => fileInput.click());

        // File input change
        fileInput.addEventListener('change', (e) => {
            handleFileSelect(e.target.files[0]);
        });

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFileSelect(e.dataTransfer.files[0]);
        });

        // Predict button
        predictBtn.addEventListener('click', performPrediction);

        // Clear button
        clearBtn.addEventListener('click', clearAll);

        // ================== Functions ==================

        /**
         * Handle file selection
         */
        function handleFileSelect(file) {
            if (!file) return;

            // Validate file type
            if (!file.type.startsWith('image/')) {
                showError('Please select a valid image file');
                return;
            }

            // Validate file size (20MB max)
            if (file.size > 20 * 1024 * 1024) {
                showError('File size exceeds 20MB limit');
                return;
            }

            selectedFile = file;
            fileName.textContent = file.name;
            fileInfo.classList.add('show');
            predictBtn.disabled = false;
            hideAlerts();
        }

        /**
         * Perform prediction - Main pipeline entry point
         * 
         * PIPELINE STEP 1: Frontend → Spring Boot → Flask API
         * 
         * This function orchestrates the complete data flow:
         * 1. User clicks "Predict" button
         * 2. Frontend collects selected image file
         * 3. Creates FormData with file
         * 4. Sends POST request to Spring Boot /api/predict endpoint
         * 5. Spring Boot forwards to Flask ML API
         * 6. Flask returns prediction with base64 overlay image
         * 7. Spring Boot returns response to frontend
         * 8. Frontend displays results
         * 
         * Request Details:
         * - Method: POST
         * - URL: http://localhost:8080/api/predict
         * - Content-Type: multipart/form-data (automatically set by FormData)
         * - Body: file parameter with image
         * 
         * Response Details (Success - 200 OK):
         * {
         *   "success": true,
         *   "confidence": 85.5,
         *   "has_oil_spill": true,
         *   "overlay_image": "data:image/png;base64,iVBORw0KGgo...",
         *   "prediction_map": "data:image/png;base64,iVBORw0KGgo..."
         * }
         * 
         * Response Details (Error - 400/500):
         * {
         *   "success": false,
         *   "error_code": "FILE_ERROR",
         *   "error": "Invalid file format..."
         * }
         */
        async function performPrediction() {
            if (!selectedFile) return;

            // ========== STEP 1: Prepare Multipart Request ==========
            // Create FormData object to send file as multipart/form-data
            // This is equivalent to HTML form submission
            const formData = new FormData();
            formData.append('file', selectedFile);

            // ========== STEP 2: Show Loading State ==========
            // Disable button and show loading spinner while waiting for response
            loading.classList.add('show');
            predictionInfo.classList.remove('show');
            imageContainer.innerHTML = '<div class="image-placeholder">Analyzing...</div>';
            predictBtn.disabled = true;
            hideAlerts();

            try {
                console.log('═══════════════════════════════════════════════════════');
                console.log('PIPELINE INITIATED: Frontend Request');
                console.log('═══════════════════════════════════════════════════════');
                console.log('📥 File selected:', selectedFile.name);
                console.log('📤 Sending POST request to:', API_ENDPOINT);
                console.log('   Content-Type: multipart/form-data');
                console.log('   File size:', (selectedFile.size / 1024).toFixed(2) + ' KB');

                // ========== STEP 3: Send HTTP Request to Spring Boot ==========
                // Fetch API makes POST request with FormData
                // Spring Boot receives on endpoint: POST /api/predict
                // Spring Boot validates file and forwards to Flask ML API
                // 
                // Pipeline:
                // Frontend → Spring Boot (localhost:8080)
                //         → Flask API (127.0.0.1:5000)
                //         → Spring Boot (processing)
                //         → Frontend (response)
                
                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    body: formData
                    // Note: DO NOT set Content-Type header
                    // Fetch API automatically sets it for FormData
                });

                // ========== STEP 4: Parse Response ==========
                // Spring Boot returns JSON response (automatically serialized)
                // Response includes base64 encoded overlay image
                const data = await response.json();
                console.log('\n📥 Response received from Spring Boot');
                console.log('   HTTP Status:', response.status);
                console.log('   Response data:', data);

                // Check HTTP status code
                if (!response.ok) {
                    // ========== ERROR RESPONSE ==========
                    // HTTP 400: File validation error
                    // HTTP 500: Flask API error or server error
                    console.error('❌ Prediction failed');
                    console.error('   Status:', response.status);
                    console.error('   Error Code:', data.error_code);
                    console.error('   Error:', data.error);
                    
                    showError(data.error || 'Prediction failed');
                    return;
                }

                // ========== SUCCESS RESPONSE ==========
                // HTTP 200: Prediction successful
                console.log('✓ Prediction successful!');
                console.log('   Confidence:', data.confidence + '%');
                console.log('   Oil Spill Detected:', data.has_oil_spill);
                console.log('   Overlay image size:', data.overlay_image.length, 'characters');
                
                // Display results
                displayResults(data);
                showSuccess('Analysis completed successfully!');
                
                console.log('═══════════════════════════════════════════════════════');
                console.log('✓ PIPELINE COMPLETED');
                console.log('═══════════════════════════════════════════════════════\n');

            } catch (error) {
                // ========== NETWORK ERROR ==========
                // Connection timeout, network error, etc.
                console.error('❌ Network error:', error);
                console.error('   Make sure Spring Boot is running on port 8080');
                console.error('   Command: mvn spring-boot:run');
                
                showError('Network error: ' + error.message);
            } finally {
                // ========== CLEANUP ==========
                // Hide loading spinner and enable button
                loading.classList.remove('show');
                predictBtn.disabled = false;
            }
        }

        /**
         * Display prediction results
         * 
         * PIPELINE STEP 2: Frontend Display & Visualization
         * 
         * This function takes the response from Spring Boot and displays it:
         * 1. Receives base64 encoded overlay_image from Flask (via Spring Boot)
         * 2. Creates <img> element with data URL
         * 3. Updates confidence bar with animation
         * 4. Shows oil spill status with color-coded badge
         * 
         * Data Source:
         * - overlay_image: Base64 PNG from Flask ML API
         *   This image shows the original satellite image with red highlights
         *   where oil spills are detected (regions where prediction > 0.3)
         * 
         * - confidence: Percentage confidence from Flask
         *   Higher = more confident in detection
         * 
         * - has_oil_spill: Boolean from Flask
         *   true if confidence > 50%, false otherwise
         * 
         * @param {Object} data Response from Spring Boot /api/predict endpoint
         * @param {number} data.confidence Confidence percentage (0-100)
         * @param {boolean} data.has_oil_spill Whether oil spill was detected
         * @param {string} data.overlay_image Base64 PNG with red highlights
         * @param {string} data.prediction_map Base64 binary mask
         */
        function displayResults(data) {
            console.log('\n--- Displaying Results ---');
            
            // ========== STEP 1: Display Overlay Image ==========
            // Create <img> element with base64 data URL from Flask response
            // The overlay_image is a PNG with:
            // - Original satellite image
            // - Red colored regions where oil spill was detected
            // - Alpha blending (60% opacity) for visibility
            
            if (data.overlay_image) {
                console.log('📊 Creating image element');
                console.log('   Source: data:image/png;base64,...');
                console.log('   From: Flask ML API → Spring Boot → Frontend');
                
                const img = document.createElement('img');
                img.src = data.overlay_image;  // Base64 encoded PNG
                img.className = 'result-image fade-in';
                imageContainer.innerHTML = '';
                imageContainer.appendChild(img);
                
                console.log('✓ Overlay image displayed');
            }

            // ========== STEP 2: Update Oil Spill Status ==========
            // Show if oil spill was detected with color-coded badge
            // Green (✅) = No spill detected
            // Red (⚠️) = Oil spill detected
            
            const status = data.has_oil_spill ? '⚠️ Oil Spill Detected' : '✅ No Oil Spill';
            const statusClass = data.has_oil_spill ? 'status-detected' : 'status-safe';
            
            statusValue.textContent = status;
            statusValue.className = 'prediction-value ' + statusClass;
            
            console.log('📍 Status:', status);
            console.log('   Class:', statusClass);
            
            // ========== STEP 3: Update Confidence Bar ==========
            // Animate confidence bar from 0% to actual confidence
            // Confidence represents model's certainty about the prediction
            const confidence = data.confidence || 0;
            
            confidenceValue.textContent = confidence.toFixed(2) + '%';
            confidenceFill.style.width = confidence + '%';
            confidencePercent.textContent = confidence.toFixed(1) + '%';
            
            console.log('📈 Confidence:', confidence.toFixed(2) + '%');
            console.log('   Bar width animated from 0% to ' + confidence.toFixed(1) + '%');
            
            // ========== STEP 4: Show Prediction Info Section ==========
            // Make the results panel visible
            predictionInfo.classList.add('show');
            
            console.log('\n✓ Results displayed successfully');
        }

        /**
         * Clear all
         */
        function clearAll() {
            selectedFile = null;
            fileInput.value = '';
            fileInfo.classList.remove('show');
            predictionInfo.classList.remove('show');
            loading.classList.remove('show');
            predictBtn.disabled = true;
            imageContainer.innerHTML = '<div class="image-placeholder">Prediction image will appear here</div>';
            hideAlerts();
        }

        /**
         * Show error message
         */
        function showError(message) {
            errorAlert.textContent = message;
            errorAlert.classList.add('show');
            console.error('Error:', message);
        }

        /**
         * Show success message
         */
        function showSuccess(message) {
            successAlert.textContent = message;
            successAlert.classList.add('show');
        }

        /**
         * Hide all alerts
         */
        function hideAlerts() {
            errorAlert.classList.remove('show');
            successAlert.classList.remove('show');
        }

        // ================== Initialize ==================
        console.log('Oil Spill Detection Frontend Loaded');
        console.log('API Endpoint:', API_ENDPOINT);
    </script>
</body>
</html>
