# ====================================
# Oil Spill Detection Backend Configuration
# ====================================

# Application Settings
spring.application.name=Oil Spill Detection Backend
server.port=8081
server.servlet.context-path=/

# Logging Configuration
logging.level.root=INFO
logging.level.com.oilspill=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# File Upload Configuration
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Flask ML API Configuration
flask.api.url=http://127.0.0.1:5000/predict

# Jackson Configuration (JSON serialization)
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false
